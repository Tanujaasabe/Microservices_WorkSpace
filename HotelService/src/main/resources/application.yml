server:
  port: 8082

spring:
  application:
    name: HOTELSERVICE
	
  config:
	import: optional:configserver:http://localhost:8087

  datasource:
    url: jdbc:mysql://localhost:3306/HotelService
    username: root
    password: System@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  instance:
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8084/eureka/